<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pundo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; color: #333; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1500px; margin: 0 auto; align-items: flex-start; }
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 三欄位比例分配 */
        .col-left { flex: 2.8; display: flex; flex-direction: column; gap: 20px; }
        .col-mid { flex: 5.2; display: flex; flex-direction: column; gap: 20px; }
        .col-right { flex: 4.0; display: flex; flex-direction: column; gap: 20px; }
        
        h4 { margin-top: 0; border-bottom: 2px solid #008B8B; padding-bottom: 5px; color: #008B8B; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .col { flex: 1; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-primary { background-color: #337ab7; color: white; }
        .btn-primary:hover { background-color: #286090; }
        .btn-danger { background-color: #d9534f; color: white; }
        .btn-danger:hover { background-color: #c9302c; }
        .btn-success { background-color: #5cb85c; color: white; font-size: 14px; padding: 10px; width: 100%; }
        .btn-success:hover { background-color: #449d44; }
        
        #canvas-container { background-color: transparent; margin-top: 0; display: flex; justify-content: center; overflow: visible; position: relative; }
        canvas { max-width: 100%; height: auto; background-color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: crosshair; touch-action: none; }
        
        /* 放大鏡圓圈樣式 */
        #magnifierCanvas {
            display: none;
            position: absolute;
            width: 180px;
            height: 180px;
            border: 2px solid #333;
            border-radius: 50%;
            background: white;
            box-shadow: 0 3px 12px rgba(0,0,0,0.35);
            pointer-events: none;
            z-index: 20;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 0; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f2f2f2; position: sticky; top: 0; z-index: 5; }
        tr.selected { background-color: #d9edf7; }
        tr:hover { background-color: #f5f5f5; cursor: pointer; }
        .notice { font-size: 12px; color: #d9534f; margin-bottom: 10px; }
        
        /* 連動資料區塊縮小字級與排版 */
        .linked-data-box { background-color: #ececec; padding: 10px; border-radius: 6px; border: 1px solid #dcdcdc; margin-bottom: 12px; box-sizing: border-box; }
        .linked-data-box span.title { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: bold; display: block; }
        .linked-data-box label { font-size: 11px; color: #555; margin-bottom: 2px; }
        .small-input { padding: 4px; font-size: 12px; height: 26px; box-sizing: border-box; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
        
        /* 手機與平板自適應 */
        @media (max-width: 768px) {
           .container { flex-direction: column; align-items: stretch; }
           .col-left, .col-mid, .col-right { flex: none; width: 100%; }
           body { padding: 10px; }
           }
    </style>
</head>
<body>

<div class="container">

    <div class="col-left">
        <div class="panel">
            <h4>1. 資料上傳</h4>
            <div class="form-group">
                <label>CSV 編碼格式</label>
                <select id="encoding">
                    <option value="UTF-8">UTF-8</option>
                    <option value="Big5">Big5 / ASCII</option>
                </select>
            </div>
            <div class="form-group">
                <label>上傳 CSV 檔案</label>
                <input type="file" id="csvFileInput" accept=".csv">
            </div>
        </div>

        <div class="panel">
            <h4>2. 點位植株</h4>
            <div class="notice" id="statusMsg">請輸入植物資訊後，點擊「準備點擊圖面」</div>

            <div class="row form-group">
                <div class="col" style="flex: 1.5;">
                    <label style="font-size: 15px; color: #008B8B;">Tag (標籤) - 主要目標</label>
                    <input type="text" id="inTag" style="border: 2px solid #008B8B; font-weight: bold; font-size: 16px; padding: 8px;">
                </div>
                <div class="col" style="flex: 1;">
                    <label style="font-size: 15px; color: #008B8B;">選擇Plot</label>
                    <select id="plotFilterSelect" style="border: 2px solid #008B8B; font-weight: bold; font-size: 16px; padding: 8px;">
                        <option value="">全部樣區</option>
                    </select>
                </div>
            </div>

            <div class="linked-data-box">
                <span class="title">依 Tag 連動資料 (或手動篩選樣方)：</span>
                <div class="row">
                    <div class="col"><label>Plot (樣區)</label><input type="text" id="inPlot" class="small-input"></div>
                    <div class="col"><label>Species (物種)</label><input type="text" id="inSp" class="small-input"></div>
                    <div class="col"><label>DBH(數值)</label><input type="number" id="inDbh" class="small-input" value="10"></div>
                </div>
                <div class="row" style="margin-bottom: 0;">
                    <div class="col"><label>x1</label><select id="inX1" class="small-input"><option value="ALL">所有 x1</option></select></div>
                    <div class="col"><label>y1</label><select id="inY1" class="small-input"><option value="ALL">所有 y1</option></select></div>
                    <div class="col"><label>x2</label><select id="inX2" class="small-input"><option value="ALL">所有 x2</option></select></div>
                    <div class="col"><label>y2</label><select id="inY2" class="small-input"><option value="ALL">所有 y2</option></select></div>
                </div>
            </div>
        </div>


        <div class="panel">
            <h4>3. 畫布與底圖校正</h4>
            <div class="row form-group">
                <div class="col"><label>X軸範圍 (cm)</label><input type="number" id="maxX" value="500"></div>
                <div class="col"><label>Y軸範圍 (cm)</label><input type="number" id="maxY" value="500"></div>
            </div>
            <div class="form-group">
                <label>上傳底圖 (JPG, PNG, PDF)</label>
                <input type="file" id="imgFileInput" accept="image/*,.pdf,application/pdf">
            </div>

            <div class="row form-group" style="background: #eef8f8; padding: 8px; border-radius: 4px; align-items: center;">
                <div class="col">
                    <label style="font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 0;">
                        <input type="checkbox" id="magnifierToggle" style="width: auto;">
                        開啟放大鏡
                    </label>
                </div>
                <div class="col">
                    <label style="font-size: 11px; margin-bottom: 2px;">放大倍率</label>
                    <select id="magnifierZoom" class="small-input" style="height: 24px; padding: 2px;">
                        <option value="2">2×</option>
                        <option value="3" selected>3×</option>
                        <option value="4">4×</option>
                        <option value="5">5×</option>
                    </select>
                </div>
            </div>

            <div class="row form-group">
                <div class="col">
                    <label>底圖旋轉 (度)</label>
                    <input type="number" id="imgAngle" value="0" step="90">
                </div>
                <div class="col">
                    <label>黑框外 buffer (%)</label>
                    <input type="number" id="frameBufferPct" value="8" min="0" max="30" step="1">
                </div>
            </div>

            <label>微調底圖邊界：</label>
            <div class="row form-group">
                <div class="col"><label>左界 (X min)</label><input type="number" id="imgXMin" value="0"></div>
                <div class="col"><label>右界 (X max)</label><input type="number" id="imgXMax" value="500"></div>
            </div>
            <div class="row form-group">
                <div class="col"><label>下界 (Y min)</label><input type="number" id="imgYMin" value="0"></div>
                <div class="col"><label>上界 (Y max)</label><input type="number" id="imgYMax" value="500"></div>
            </div>
        </div>
    </div>

    <div class="col-mid">

        <div id="canvas-container">
            <canvas id="myCanvas"></canvas>
            <canvas id="magnifierCanvas" width="180" height="180"></canvas>
        </div>

        <div class="panel">
            <div class="row form-group" style="margin-bottom: 0;">
                <div class="col">
                    <button class="btn-primary" id="btnPrepareClick" style="font-size: 15px; padding: 11px 12px;">準備點擊圖面</button>
                </div>
                <div class="col">
                    <button class="btn-danger" id="btnDelete" style="font-size: 15px; padding: 11px 12px;">刪除選取資料</button>
                </div>
            </div>
        </div>



    </div>

    <div class="col-right">
        <div class="panel" style="height: 500px; overflow-y: auto; padding: 0;">
            <h4 style="padding: 15px 15px 5px 15px; margin: 0; position: sticky; top: 0; background: white; z-index: 6;">4. 資料呈現</h4>
            <table id="dataTable" style="margin: 0;">
                <thead>
                    <tr>
                        <th>Plot</th><th>x1</th><th>y1</th><th>x2</th><th>y2</th><th>Tag</th><th>Sp</th><th>DBH</th><th>X3</th><th>Y3</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="panel" style="background-color: #f8fcfc;">
            <h4>5. 輸出</h4>

            <div class="row" style="margin-bottom: 10px; gap: 8px;">
                <div class="col">
                    <button class="btn-success" id="btnDownload" style="font-size: 13px; padding: 8px; background-color: #0c63e4;">📥 匯出 CSV</button>
                </div>
                <div class="col">
                    <button class="btn-success" id="btnDownloadPDF" style="font-size: 13px; padding: 8px; background-color: #198754;">📄 輸出 PDF</button>
                </div>
            </div>

            <div>
                <label style="font-size: 13px; font-weight: bold; cursor: pointer;">
                    <input type="checkbox" id="exportAllDataToggle"> 匯出所有資料 (無視目前樣區與樣方篩選)
                </label>
            </div>
        </div>
    </div>

</div>


<script>
    // ============================================================
    // Pundo - Plant Spatial Points Tool
    // ============================================================

    // --- 狀態變數 ---
    let data = []; 
    let bgImg = null;
    let originalBgImg = null;
    let waitingForClick = false;
    let selectedRowRef = null;
    let activePlotFilter = '';
    let prevQuadratState = { x1: 'ALL', y1: 'ALL', x2: 'ALL', y2: 'ALL' };

    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const statusMsg = document.getElementById('statusMsg');
    const tbody = document.querySelector('#dataTable tbody');
    const plotFilterSelect = document.getElementById('plotFilterSelect');

    const getSettings = () => ({
        maxX: parseFloat(document.getElementById('maxX').value) || 500,
        maxY: parseFloat(document.getElementById('maxY').value) || 500,
        imgXMin: parseFloat(document.getElementById('imgXMin').value) || 0,
        imgXMax: parseFloat(document.getElementById('imgXMax').value) || 500,
        imgYMin: parseFloat(document.getElementById('imgYMin').value) || 0,
        imgYMax: parseFloat(document.getElementById('imgYMax').value) || 500,
        imgAngle: parseFloat(document.getElementById('imgAngle').value) || 0
    });

    // ============================================================
    // 共用工具函式
    // ============================================================

    function cleanText(v) { return v === undefined || v === null ? '' : String(v).trim(); }
    function numValue(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }
    function hasValue(v) { return v !== undefined && v !== null && String(v).trim() !== ''; }
    
    function getUniquePlotNames() {
        const plots = data.map(row => cleanText(row.plot)).filter(v => v !== '');
        return Array.from(new Set(plots)).sort();
    }

    function getVisibleData() {
        const x1Filter = document.getElementById('inX1').value;
        const y1Filter = document.getElementById('inY1').value;
        const x2Filter = document.getElementById('inX2').value;
        const y2Filter = document.getElementById('inY2').value;

        return data.filter(row => {
            let matchPlot = !activePlotFilter || cleanText(row.plot) === activePlotFilter;
            let mX1 = x1Filter === 'ALL' || cleanText(row.x1) === x1Filter;
            let mY1 = y1Filter === 'ALL' || cleanText(row.y1) === y1Filter;
            let mX2 = x2Filter === 'ALL' || cleanText(row.x2) === x2Filter;
            let mY2 = y2Filter === 'ALL' || cleanText(row.y2) === y2Filter;
            return matchPlot && mX1 && mY1 && mX2 && mY2;
        });
    }

    function populatePlotFilterSelect() {
        if (!plotFilterSelect) return;
        const plots = getUniquePlotNames();
        
        plotFilterSelect.innerHTML = '<option value="">全部樣區</option>';
        plots.forEach(plotName => {
            const opt = document.createElement('option');
            opt.value = plotName; opt.textContent = plotName; plotFilterSelect.appendChild(opt);
        });

        if (plots.length === 0) {
            plotFilterSelect.disabled = true; activePlotFilter = '';
        } else {
            plotFilterSelect.disabled = false;
            if (activePlotFilter && !plots.includes(activePlotFilter)) activePlotFilter = '';
            plotFilterSelect.value = activePlotFilter;
        }
    }

    function updateQuadratSelects() {
        const dataForPlot = activePlotFilter ? data.filter(d => cleanText(d.plot) === activePlotFilter) : data;

        const uX1 = [...new Set(dataForPlot.map(d => cleanText(d.x1)).filter(v => v !== ''))].sort((a,b)=>a-b);
        const uY1 = [...new Set(dataForPlot.map(d => cleanText(d.y1)).filter(v => v !== ''))].sort((a,b)=>a-b);
        const uX2 = [...new Set(dataForPlot.map(d => cleanText(d.x2)).filter(v => v !== ''))].sort((a,b)=>a-b);
        const uY2 = [...new Set(dataForPlot.map(d => cleanText(d.y2)).filter(v => v !== ''))].sort((a,b)=>a-b);

        function fillSelect(id, uniqueVals, allText) {
            const el = document.getElementById(id);
            const cur = el.value;
            el.innerHTML = `<option value="ALL">${allText}</option>`;
            uniqueVals.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v; el.appendChild(opt);
            });
            el.value = (cur === 'ALL' || uniqueVals.includes(cur)) ? cur : 'ALL';
        }

        fillSelect('inX1', uX1, '所有 x1');
        fillSelect('inY1', uY1, '所有 y1');
        fillSelect('inX2', uX2, '所有 x2');
        fillSelect('inY2', uY2, '所有 y2');
    }

    function fillFormFromRow(row, updateQuadDropdowns = true) {
        if (!row) return;
        document.getElementById('inTag').value = row.tag || '';
        document.getElementById('inPlot').value = row.plot || '';
        document.getElementById('inSp').value = row.sp || '';
        document.getElementById('inDbh').value = row.dbh || '';
        
        if (updateQuadDropdowns) {
            document.getElementById('inX1').value = hasValue(row.x1) ? cleanText(row.x1) : 'ALL';
            document.getElementById('inY1').value = hasValue(row.y1) ? cleanText(row.y1) : 'ALL';
            document.getElementById('inX2').value = hasValue(row.x2) ? cleanText(row.x2) : 'ALL';
            document.getElementById('inY2').value = hasValue(row.y2) ? cleanText(row.y2) : 'ALL';
        }
    }

    function checkQuadratHasBlanks(plotFilter, quadState) {
        if (quadState.x1 === 'ALL' && quadState.y1 === 'ALL' && quadState.x2 === 'ALL' && quadState.y2 === 'ALL') return false;
        const targetData = data.filter(row => {
            let mPlot = !plotFilter || cleanText(row.plot) === plotFilter;
            let mX1 = quadState.x1 === 'ALL' || cleanText(row.x1) === quadState.x1;
            let mY1 = quadState.y1 === 'ALL' || cleanText(row.y1) === quadState.y1;
            let mX2 = quadState.x2 === 'ALL' || cleanText(row.x2) === quadState.x2;
            let mY2 = quadState.y2 === 'ALL' || cleanText(row.y2) === quadState.y2;
            return mPlot && mX1 && mY1 && mX2 && mY2;
        });
        return targetData.some(row => !hasValue(row.x3) || !hasValue(row.y3));
    }

    function isAllQuadratState(state) {
        return state &&
            state.x1 === 'ALL' &&
            state.y1 === 'ALL' &&
            state.x2 === 'ALL' &&
            state.y2 === 'ALL';
    }

    function applyFiltersAndAutoSelect() {
        draw();
        renderTable();
        const visibleData = getVisibleData();
        if (visibleData.length > 0) {
            let targetRow = visibleData.find(row => !hasValue(row.x3) || !hasValue(row.y3));
            if (targetRow) {
                statusMsg.innerText = `🎯 自動定位至未標記木！請點選圖面。Tag: ${targetRow.tag}`;
                statusMsg.style.color = '#337ab7';
            } else {
                targetRow = visibleData[0];
                statusMsg.innerText = `💡 本區皆已標記完畢。自動選取首列 Tag: ${targetRow.tag}`;
                statusMsg.style.color = '#5cb85c';
            }
            selectedRowRef = targetRow;
            fillFormFromRow(targetRow, false);
        } else {
            document.getElementById('inTag').value = '';
            document.getElementById('inSp').value = '';
            document.getElementById('inDbh').value = '';
            selectedRowRef = null;
            statusMsg.innerText = `此篩選條件下無點位資料，請手動登錄新樹木。`;
            statusMsg.style.color = '#d9534f';
        }
    }

    function handleQuadratChange() {
        const nextState = {
            x1: document.getElementById('inX1').value,
            y1: document.getElementById('inY1').value,
            x2: document.getElementById('inX2').value,
            y2: document.getElementById('inY2').value
        };

        const shouldWarn = !isAllQuadratState(prevQuadratState) && checkQuadratHasBlanks(activePlotFilter, prevQuadratState);

        if (shouldWarn) {
            const proceed = confirm("⚠️ 目前樣方內仍有 x3, y3 空白值，是否確認要更換樣方？");
            if (!proceed) {
                document.getElementById('inX1').value = prevQuadratState.x1;
                document.getElementById('inY1').value = prevQuadratState.y1;
                document.getElementById('inX2').value = prevQuadratState.x2;
                document.getElementById('inY2').value = prevQuadratState.y2;
                applyFiltersAndAutoSelect();
                return;
            }
        }
        prevQuadratState = nextState;
        applyFiltersAndAutoSelect();
    }

    function checkCurrentTagVisibility() {
        const tag = cleanText(document.getElementById('inTag').value);
        if(!tag) return;
        const visibleData = getVisibleData();
        if (!visibleData.some(d => cleanText(d.tag) === tag)) {
            document.getElementById('inTag').value = '';
            document.getElementById('inSp').value = '';
            document.getElementById('inDbh').value = '';
            selectedRowRef = null;
        }
    }

    // ============================================================
    // 放大鏡核心邏輯
    // ============================================================

    const magnifierCanvas = document.getElementById('magnifierCanvas');
    const magnifierCtx = magnifierCanvas ? magnifierCanvas.getContext('2d') : null;

    function isMagnifierEnabled() {
        const toggle = document.getElementById('magnifierToggle');
        return toggle && toggle.checked;
    }

    function hideMagnifier() {
        if (magnifierCanvas) magnifierCanvas.style.display = 'none';
    }

    function updateMagnifier(e) {
        if (!isMagnifierEnabled() || !magnifierCanvas || !magnifierCtx) return;

        magnifierCanvas.style.display = 'block';

        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        magnifierCanvas.style.left = (mouseX - 90) + 'px';
        magnifierCanvas.style.top = (mouseY - 90) + 'px';

        const zoomSelect = document.getElementById('magnifierZoom');
        const zoom = zoomSelect ? parseFloat(zoomSelect.value) : 3;

        magnifierCtx.clearRect(0, 0, magnifierCanvas.width, magnifierCanvas.height);
        magnifierCtx.imageSmoothingEnabled = false; 

        const sw = magnifierCanvas.width / zoom;
        const sh = magnifierCanvas.height / zoom;
        
        const internalX = mouseX * (canvas.width / rect.width);
        const internalY = mouseY * (canvas.height / rect.height);
        const sx = internalX - sw / 2;
        const sy = internalY - sh / 2;

        magnifierCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, magnifierCanvas.width, magnifierCanvas.height);

        magnifierCtx.strokeStyle = 'rgba(217, 83, 79, 0.9)'; 
        magnifierCtx.lineWidth = 1.5;
        magnifierCtx.beginPath();
        magnifierCtx.moveTo(90, 0); magnifierCtx.lineTo(90, 180);
        magnifierCtx.moveTo(0, 90); magnifierCtx.lineTo(180, 90);
        magnifierCtx.stroke();
        
        magnifierCtx.beginPath();
        magnifierCtx.arc(90, 90, 3, 0, Math.PI * 2);
        magnifierCtx.stroke();
    }

    canvas.addEventListener('pointermove', updateMagnifier);
    canvas.addEventListener('pointerleave', hideMagnifier);

    const magnifierToggle = document.getElementById('magnifierToggle');
    if (magnifierToggle) {
        magnifierToggle.addEventListener('change', function() {
            if (!this.checked) hideMagnifier();
        });
    }

    // ============================================================
    // 事件監聽與資料綁定
    // ============================================================

    if (plotFilterSelect) {
        plotFilterSelect.addEventListener('change', function(e) {
            activePlotFilter = e.target.value;
            document.getElementById('inPlot').value = activePlotFilter;
            updateQuadratSelects();
            prevQuadratState = {
                x1: document.getElementById('inX1').value, y1: document.getElementById('inY1').value,
                x2: document.getElementById('inX2').value, y2: document.getElementById('inY2').value
            };
            applyFiltersAndAutoSelect();
        });
    }

    ['inX1', 'inY1', 'inX2', 'inY2'].forEach(id => {
        document.getElementById(id).addEventListener('change', handleQuadratChange);
    });

    document.getElementById('inTag').addEventListener('input', function(e) {
        const val = cleanText(e.target.value);
        if (!val) return;

        const match = data.find(d => cleanText(d.tag) === val);
        if (match) {
            selectedRowRef = match;
            if (match.plot) {
                activePlotFilter = cleanText(match.plot);
                if (plotFilterSelect) plotFilterSelect.value = activePlotFilter;
            }
            updateQuadratSelects();
            fillFormFromRow(match, true); 
            
            prevQuadratState = {
                x1: document.getElementById('inX1').value, y1: document.getElementById('inY1').value,

    function detectBlackFrameBounds(img) {
        const sourceW = img.naturalWidth || img.width;
        const sourceH = img.naturalHeight || img.height;
        if (!sourceW || !sourceH) return null;

        const maxDetectSize = 1200;
        const detectScale = Math.min(1, maxDetectSize / Math.max(sourceW, sourceH));
        const w = Math.max(1, Math.round(sourceW * detectScale));
        const h = Math.max(1, Math.round(sourceH * detectScale));

        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width = w; tmpCanvas.height = h;
        const tmpCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
        tmpCtx.drawImage(img, 0, 0, w, h);
        const imgData = tmpCtx.getImageData(0, 0, w, h).data;

        const rowCounts = new Uint32Array(h);
        const colCounts = new Uint32Array(w);

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const idx = (y * w + x) * 4;
                if (imgData[idx+3] >= 80 && ((imgData[idx] + imgData[idx+1] + imgData[idx+2]) / 3) < 95) {
                    rowCounts[y]++; colCounts[x]++;
                }
            }
        }

        function findPeakIndex(counts, start, end, minCount) {
            let bestIdx = -1; let bestVal = 0;
            for (let i = start; i <= end; i++) {
                if (counts[i] > bestVal) { bestVal = counts[i]; bestIdx = i; }
            }
            return bestVal >= minCount ? bestIdx : -1;
        }

        const minRowCount = Math.max(30, Math.floor(w * 0.25));
        const minColCount = Math.max(30, Math.floor(h * 0.25));

        const topSmall = findPeakIndex(rowCounts, 0, Math.floor(h * 0.45), minRowCount);
        const bottomSmall = findPeakIndex(rowCounts, Math.floor(h * 0.55), h - 1, minRowCount);
        const leftSmall = findPeakIndex(colCounts, 0, Math.floor(w * 0.45), minColCount);
        const rightSmall = findPeakIndex(colCounts, Math.floor(w * 0.55), w - 1, minColCount);

        if (topSmall < 0 || bottomSmall < 0 || leftSmall < 0 || rightSmall < 0) return null;
        const inv = 1 / detectScale;
        return {
            frameX: Math.max(0, Math.floor(leftSmall * inv)),
            frameY: Math.max(0, Math.floor(topSmall * inv)),
            frameWidth: (Math.min(sourceW, Math.ceil(rightSmall * inv)) - Math.max(0, Math.floor(leftSmall * inv))),
            frameHeight: (Math.min(sourceH, Math.ceil(bottomSmall * inv)) - Math.max(0, Math.floor(topSmall * inv))),
            sourceW: sourceW, sourceH: sourceH
        };
    }

    function autoCropBlackFrameAndAlign(sourceImg) {
        const frame = detectBlackFrameBounds(sourceImg);
        if (!frame) {
            bgImg = sourceImg; draw();
            statusMsg.innerText = '⚠️ 找不到明確黑框，已保留原始底圖。'; statusMsg.style.color = '#d9534f';
            return;
        }

        const bufferPct = parseFloat(document.getElementById('frameBufferPct').value) || 0;
        const bufferX = frame.frameWidth * bufferPct / 100;
        const bufferY = frame.frameHeight * bufferPct / 100;

        const cropX = Math.max(0, Math.floor(frame.frameX - bufferX));
        const cropY = Math.max(0, Math.floor(frame.frameY - bufferY));
        const cropRight = Math.min(frame.sourceW, Math.ceil(frame.frameX + frame.frameWidth + bufferX));
        const cropBottom = Math.min(frame.sourceH, Math.ceil(frame.frameY + frame.frameHeight + bufferY));

        const cropW = cropRight - cropX; const cropH = cropBottom - cropY;
        const cropCanvas = document.createElement('canvas');
        cropCanvas.width = cropW; cropCanvas.height = cropH;
        cropCanvas.getContext('2d').drawImage(sourceImg, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

        const croppedImg = new Image();
        croppedImg.onload = function() {
            bgImg = croppedImg;
            const s = getSettings();
            const leftExtraData = (frame.frameX - cropX) * (s.maxX / frame.frameWidth);
            const rightExtraData = (cropRight - (frame.frameX + frame.frameWidth)) * (s.maxX / frame.frameWidth);
            const topExtraData = (frame.frameY - cropY) * (s.maxY / frame.frameHeight);
            const bottomExtraData = (cropBottom - (frame.frameY + frame.frameHeight)) * (s.maxY / frame.frameHeight);

            document.getElementById('imgXMin').value = (-leftExtraData).toFixed(2);
            document.getElementById('imgXMax').value = (s.maxX + rightExtraData).toFixed(2);
            document.getElementById('imgYMin').value = (-bottomExtraData).toFixed(2);
            document.getElementById('imgYMax').value = (s.maxY + topExtraData).toFixed(2);
            document.getElementById('imgAngle').value = 0;
            draw();
            statusMsg.innerText = `✔️ 已自動對齊黑框格線 (外側 Buffer: ${bufferPct}%)`;
            statusMsg.style.color = '#5cb85c';
        };
        croppedImg.src = cropCanvas.toDataURL('image/png');
    }

    function parseCsvLine(line) {
        const result = []; let current = ''; let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i]; const nextChar = line[i + 1];
            if (char === '"' && inQuotes && nextChar === '"') { current += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { result.push(current); current = ''; }
            else { current += char; }
        }
        result.push(current); return result;
    }

    function draw() {
        const s = getSettings(); const visibleData = getVisibleData();
        const maxCanvasSize = 800; const pad = { top: 30, right: 30, bottom: 50, left: 60 }; let scale;
        if (s.maxX >= s.maxY) {
            canvas.width = maxCanvasSize; scale = (canvas.width - pad.left - pad.right) / s.maxX; canvas.height = (s.maxY * scale) + pad.top + pad.bottom;
        } else {
            canvas.height = maxCanvasSize; scale = (canvas.height - pad.top - pad.bottom) / s.maxY; canvas.width = (s.maxX * scale) + pad.left + pad.right;
        }
        const originX = pad.left; const originY = canvas.height - pad.bottom;
        const toPix = (dataX, dataY) => ({ x: originX + (dataX * scale), y: originY - (dataY * scale) });

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (bgImg) {
            ctx.save();
            let ptTL = toPix(s.imgXMin, s.imgYMax); let ptBR = toPix(s.imgXMax, s.imgYMin);
            ctx.translate(ptTL.x + (ptBR.x - ptTL.x)/2, ptTL.y + (ptBR.y - ptTL.y)/2); ctx.rotate(s.imgAngle * Math.PI / 180);
            ctx.drawImage(bgImg, -(ptBR.x - ptTL.x)/2, -(ptBR.y - ptTL.y)/2, ptBR.x - ptTL.x, ptBR.y - ptTL.y); ctx.restore();
        }
        ctx.font = '12px Arial'; ctx.fillStyle = '#333'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        for(let i = 0; i <= 10; i++) {
            let val = (s.maxX / 10) * i; let pt = toPix(val, 0); ctx.beginPath();
            ctx.strokeStyle = (i===0||i===5||i===10)?'#333':'#ccc'; ctx.lineWidth = (i===0||i===5||i===10)?1.5:1; ctx.setLineDash((i===0||i===5||i===10)?[]:[4,4]);
            ctx.moveTo(pt.x, originY); ctx.lineTo(pt.x, pad.top); ctx.stroke(); ctx.fillText(val.toFixed(0), pt.x, originY + 8);
        }
        ctx.fillText("X 座標 (cm)", originX + (s.maxX * scale) / 2, originY + 28);
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        for(let i = 0; i <= 10; i++) {
            let val = (s.maxY / 10) * i; let pt = toPix(0, val); ctx.beginPath();
            ctx.strokeStyle = (i===0||i===5||i===10)?'#333':'#ccc'; ctx.lineWidth = (i===0||i===5||i===10)?1.5:1; ctx.setLineDash((i===0||i===5||i===10)?[]:[4,4]);
            ctx.moveTo(originX, pt.y); ctx.lineTo(originX + s.maxX * scale, pt.y); ctx.stroke(); ctx.fillText(val.toFixed(0), originX - 8, pt.y);
        }
        ctx.save(); ctx.translate(originX - 35, originY - (s.maxY * scale) / 2); ctx.rotate(-Math.PI / 2); ctx.textAlign = 'center'; ctx.fillText("Y 座標 (cm)", 0, 0); ctx.restore();
        ctx.strokeStyle = 'black'; ctx.lineWidth = 2; ctx.setLineDash([]); ctx.strokeRect(originX, pad.top, s.maxX * scale, s.maxY * scale);

        visibleData.forEach(p => {
            if(p.x3 === undefined || p.y3 === undefined || isNaN(p.x3) || isNaN(p.y3)) return;
            let pt = toPix(p.x3, p.y3); let radius = Math.max(3, Math.min(15, parseFloat(p.dbh) || 5)); 
            ctx.beginPath(); ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 139, 139, 0.6)'; ctx.fill(); ctx.strokeStyle = '#008B8B'; ctx.stroke();
            ctx.fillStyle = '#008B8B'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'left'; ctx.fillText(p.tag, pt.x + radius + 3, pt.y);
        });
    }

    function scrollRowIntoTableView(rowEl) {
        if (!rowEl) return;

        const rowRect = rowEl.getBoundingClientRect();

        const rowTopInBox = rowRect.top - boxRect.top + scrollBox.scrollTop;
        const targetTop = rowTopInBox - (scrollBox.clientHeight / 2) + (rowEl.offsetHeight / 2);

        scrollBox.scrollTo({

        });

    function circleRadiusFromDbh(dbh) {
        if (!dbh || dbh <= 0) return 1.2;
        const r = (dbh / 105) * 6.5;
        return Math.max(1.2, Math.min(6.5, r));
    }

    function boxesOverlap(a, b) {
        return !(a.x2 < b.x1 || a.x1 > b.x2 || a.y2 < b.y1 || a.y1 > b.y2);
    }

    function placeLabel(doc, text, pointX, pointY, radius, usedBoxes, pdfW, pdfH) {
        doc.setFontSize(7);
        const labelW = doc.getTextWidth(text);
        const labelH = 3.0;
        const candidates = [
            { dx: radius + 1.5, dy: -radius - 0.5 }, { dx: radius + 1.5, dy: radius + 2.5 },
            { dx: -radius - labelW - 1.5, dy: -radius - 0.5 }, { dx: -radius - labelW - 1.5, dy: radius + 2.5 },
            { dx: -labelW / 2, dy: -radius - 3.0 }, { dx: -labelW / 2, dy: radius + 4.0 }
        ];

        for (const c of candidates) {
            const x = pointX + c.dx; const y = pointY + c.dy;
            const box = { x1: x, y1: y - labelH, x2: x + labelW, y2: y + 0.8 };
            if (box.x1 < 3 || box.x2 > 207 || box.y1 < 3 || box.y2 > 294) continue;
            if (!usedBoxes.some(b => boxesOverlap(box, b))) {
                usedBoxes.push(box); doc.text(text, x, y); return;
            }
        }
        const fallbackX = pointX + radius + 1.5; const fallbackY = pointY - radius - 0.5;
        usedBoxes.push({ x1: fallbackX, y1: fallbackY - labelH, x2: fallbackX + labelW, y2: fallbackY + 0.8 });
        doc.text(text, fallbackX, fallbackY);
    }

    function drawPdfPage(doc, options) {
        const siteName = options.siteName || 'Pundo';
        const plotPoints = options.plotPoints || [];
        const quadrat = options.quadrat || null;
        if (!options.isFirstPage) doc.addPage();

        const s = getSettings();
        const maxSize = 140; 
        let pdfW = maxSize; let pdfH = maxSize;
        if (s.maxX >= s.maxY) pdfH = maxSize * (s.maxY / s.maxX);
        else pdfW = maxSize * (s.maxX / s.maxY);

        const mapLeft = 35; const mapTop = 60;  
        const toPdfX = x => mapLeft + (x / s.maxX) * pdfW;
        const toPdfY = y => mapTop + pdfH - (y / s.maxY) * pdfH;

        let title = siteName;
        if (quadrat && (quadrat.X1 || quadrat.Y1 || quadrat.xbase || quadrat.ybase)) {
            title = `${siteName}  Quadrat No.(${quadrat.X1},${quadrat.Y1}) (${quadrat.xbase},${quadrat.ybase})`;
        }

        doc.setFont('helvetica', 'bold'); doc.setFontSize(13); doc.setTextColor(0, 0, 0);
        doc.text(title, mapLeft, mapTop - 8);

        // 已依需求移除底圖匯出功能，確保印出乾淨點圖

        doc.setDrawColor(210, 210, 210); doc.setLineWidth(0.15);
        for (let i = 1; i < 10; i++) {
            let xVal = (s.maxX / 10) * i; let px = toPdfX(xVal); doc.line(px, mapTop, px, mapTop + pdfH);
            let yVal = (s.maxY / 10) * i; let py = toPdfY(yVal); doc.line(mapLeft, py, mapLeft + pdfW, py);
        }

        doc.setDrawColor(0, 0, 0); doc.setLineWidth(0.35);
        doc.line(toPdfX(s.maxX / 2), mapTop, toPdfX(s.maxX / 2), mapTop + pdfH);
        doc.line(mapLeft, toPdfY(s.maxY / 2), mapLeft + pdfW, toPdfY(s.maxY / 2));

        doc.setDrawColor(0, 0, 0); doc.setLineWidth(0.5); doc.rect(mapLeft, mapTop, pdfW, pdfH);

        const usedBoxes = [];
        plotPoints.slice().sort((a, b) => b.dbhNum - a.dbhNum).forEach(p => {
            const x = toPdfX(p.relX), y = toPdfY(p.relY), r = circleRadiusFromDbh(p.dbhNum);
            doc.setDrawColor(p.dbhNum > 0 ? 0 : 160); doc.setLineWidth(0.25); doc.circle(x, y, r, 'S');
        });

        plotPoints.slice().sort((a, b) => b.dbhNum - a.dbhNum).forEach(p => {
            if (!p.tagText) return;
            const x = toPdfX(p.relX), y = toPdfY(p.relY), r = circleRadiusFromDbh(p.dbhNum);
            doc.setTextColor(p.dbhNum > 0 ? 0 : 160);
            placeLabel(doc, String(p.tagText), x, y, r, usedBoxes, pdfW, pdfH);
        });

        doc.setTextColor(0, 0, 0);
        const scaleX = mapLeft; const scaleY = mapTop + pdfH + 15;
        const scaleLenMm = pdfW / 10; const scaleLabel = (s.maxX / 10).toFixed(0) + ' cm';
        doc.setDrawColor(0, 0, 0); doc.setLineWidth(0.4);
        doc.line(scaleX, scaleY, scaleX + scaleLenMm, scaleY);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
        doc.text('scale', scaleX, scaleY - 2); doc.text(scaleLabel, scaleX + scaleLenMm + 2, scaleY + 1);

        doc.setFontSize(15); doc.text('(        /        )', 150, mapTop + pdfH + 30);
    }

    function makePdfFileName(siteName, quadrat = null, multiPage = false) {
        const safeSiteName = String(siteName || 'Pundo').replace(/[\\/:*?"<>|]/g, '_');
        if (multiPage) return `${safeSiteName}_field_maps.pdf`;
        if (quadrat) return `${safeSiteName}_plot(${quadrat.X1},${quadrat.Y1})(${quadrat.xbase},${quadrat.ybase}).pdf`;
        return `${safeSiteName}_field_map.pdf`;
    }

    document.getElementById('btnDownloadPDF').addEventListener('click', () => {
        if (data.length === 0) { alert('沒有資料可輸出 PDF'); return; }
        if (!window.jspdf || !window.jspdf.jsPDF) { alert('找不到 jsPDF。'); return; }

        const exportAll = document.getElementById('exportAllDataToggle').checked;
        const pdfSourceData = exportAll ? data : getVisibleData();

        if (pdfSourceData.length === 0) { alert('目前沒有資料可輸出 PDF'); return; }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        
        let siteName = activePlotFilter || getUniquePlotNames()[0] || 'Pundo';
        if (exportAll) siteName = 'Pundo_All_Data';

        const map = new Map();
        pdfSourceData.forEach(row => {
            if (numValue(row.x3) === null || numValue(row.y3) === null) return;
            if (hasValue(row.x1) || hasValue(row.y1) || hasValue(row.x2) || hasValue(row.y2)) {
                const key = `${cleanText(row.x1)}|${cleanText(row.y1)}|${cleanText(row.x2)}|${cleanText(row.y2)}`;
                if (!map.has(key)) map.set(key, { X1: cleanText(row.x1), Y1: cleanText(row.y1), xbase: cleanText(row.x2), ybase: cleanText(row.y2), key: key });
            }
        });

        const uniqueQuadrats = Array.from(map.values()).sort((a,b) => (a.Y1!==b.Y1)?a.Y1-b.Y1:a.X1-b.X1);

        if (uniqueQuadrats.length > 0) {
            uniqueQuadrats.forEach((q, index) => {
                const points = getRelativePdfPoints(q, pdfSourceData);
                drawPdfPage(doc, { siteName: (exportAll && q.X1 ? `Plot_${pdfSourceData.find(r=>cleanText(r.x1)===q.X1)?.plot||siteName}` : siteName), quadrat: q, plotPoints: points, isFirstPage: index === 0 });
            });
            doc.save(uniqueQuadrats.length === 1 ? makePdfFileName(siteName, uniqueQuadrats[0]) : makePdfFileName(siteName, null, true));
            return;
        }
        
        const simplePoints = pdfSourceData.filter(row => numValue(row.x3)!==null).map(row=>({ ...row, relX: numValue(row.x3), relY: numValue(row.y3), dbhNum: numValue(row.dbh)||0, tagText: row.tag||'' }));
        drawPdfPage(doc, { siteName: siteName, quadrat: null, plotPoints: simplePoints, isFirstPage: true });
        doc.save(makePdfFileName(siteName, null, false));
    });

    populatePlotFilterSelect(); updateQuadratSelects(); draw();
</script>
